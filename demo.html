<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REVAIA · Response Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-2: #f7f6f3; --text: #1a1a1a; --text-2: #6b6b6b;
      --text-3: #a8a8a8; --border: rgba(0,0,0,0.09); --border-2: rgba(0,0,0,0.18);
      --accent: #1a1a1a; --accent-text: #ffffff; --gold: #C9963A;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131313; --bg-2: #1c1c1c; --text: #efefef; --text-2: #999999;
        --text-3: #606060; --border: rgba(255,255,255,0.09); --border-2: rgba(255,255,255,0.20);
        --accent: #efefef; --accent-text: #131313;
      }
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5rem 1.25rem 5rem; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 11px; }
    .logo-mark { width: 36px; height: 36px; border-radius: 9px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 20px; height: 20px; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: 0.03em; }
    .logo-name span { color: var(--text-3); font-weight: 400; }
    .badge { font-size: 11px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-3); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); }
    .label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .platforms { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 2rem; }
    .platform { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border); color: var(--text-2); cursor: pointer; transition: all 0.15s; user-select: none; }
    .platform.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .platform:hover:not(.active) { border-color: var(--border-2); color: var(--text); }
    .review-block { background: var(--bg); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .stars { display: flex; gap: 4px; margin-bottom: 16px; }
    .star { font-size: 22px; cursor: pointer; color: #d0d0d0; transition: color 0.1s; user-select: none; line-height: 1; }
    .star.filled { color: var(--gold); }
    textarea { width: 100%; min-height: 120px; resize: vertical; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.7; color: var(--text); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: 8px; padding: 13px; outline: none; transition: border-color 0.15s, background 0.15s; }
    textarea:focus { border-color: var(--border-2); background: var(--bg); }
    textarea::placeholder { color: var(--text-3); }
    .char-count { font-size: 11px; color: var(--text-3); text-align: right; margin-top: 6px; }
    .lang-hint { font-size: 12px; color: var(--text-3); margin-top: 10px; display: flex; align-items: center; gap: 6px; }
    .lang-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
    .btn-generate { width: 100%; margin-top: 1rem; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.03em; color: var(--accent-text); background: var(--accent); border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn-generate:hover { opacity: 0.82; }
    .btn-generate:active { transform: scale(0.99); }
    .btn-generate:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .error { font-size: 13px; color: #b94040; margin-top: 10px; background: #fff0f0; padding: 10px; border-radius: 6px; display: none; word-break: break-all; }
    .output-wrap { margin-top: 1.5rem; display: none; }
    .output-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .output-status { display: flex; align-items: center; gap: 9px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .dot.pulsing { animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.12; } }
    .output-label { font-size: 11px; font-weight: 500; color: var(--text-2); letter-spacing: 0.09em; text-transform: uppercase; }
    .copy-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-3); background: none; border: 0.5px solid var(--border); border-radius: 6px; cursor: pointer; padding: 4px 11px; transition: color 0.15s, border-color 0.15s; display: none; }
    .copy-btn:hover { color: var(--text); border-color: var(--border-2); }
    .output-box { background: var(--bg-2); border: 0.5px solid var(--border); border-radius: 8px; padding: 18px; font-size: 15px; line-height: 1.85; color: var(--text); min-height: 80px; white-space: pre-wrap; font-style: italic; font-family: 'Cormorant Garamond', serif; }
    .stats { display: none; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 1rem; }
    .stat { background: var(--bg-2); border-radius: 8px; padding: 12px 14px; }
    .stat-val { font-size: 19px; font-weight: 500; color: var(--text); line-height: 1; margin-bottom: 5px; }
    .stat-lbl { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }
    .divider { height: 0.5px; background: var(--border); margin: 2.5rem 0; }
    .footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-text { font-size: 12px; color: var(--text-3); }
    .footer-cta { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text); text-decoration: none; padding: 9px 18px; border: 0.5px solid var(--border-2); border-radius: 8px; transition: background 0.15s; display: inline-block; }
    .footer-cta:hover { background: var(--bg-2); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M10 2L15.5 6V14L10 18L4.5 14V6L10 2Z" stroke="white" stroke-width="1.3" fill="none"/>
          <path d="M10 6L13.5 8.5V11.5L10 14L6.5 11.5V8.5L10 6Z" fill="white" opacity="0.55"/>
        </svg>
      </div>
      <div class="logo-name">REVAIA<span>.AI</span></div>
    </div>
    <div class="badge">Response Engine</div>
  </div>

  <div class="label">Platform</div>
  <div class="platforms">
    <div class="platform active" onclick="selectPlatform(this)">Google</div>
    <div class="platform" onclick="selectPlatform(this)">TripAdvisor</div>
    <div class="platform" onclick="selectPlatform(this)">Booking.com</div>
    <div class="platform" onclick="selectPlatform(this)">Expedia</div>
    <div class="platform" onclick="selectPlatform(this)">Hotels.com</div>
  </div>

  <div class="review-block">
    <div class="label">Guest review</div>
    <div class="stars" id="stars">
      <span class="star" onclick="setStar(1)">★</span>
      <span class="star" onclick="setStar(2)">★</span>
      <span class="star filled" onclick="setStar(3)">★</span>
      <span class="star filled" onclick="setStar(4)">★</span>
      <span class="star filled" onclick="setStar(5)">★</span>
    </div>
    <textarea id="review-input" placeholder="Paste a guest review here — in any language…" oninput="updateCharCount()">We had a wonderful stay at your property. The views were absolutely breathtaking and the room was immaculate. However, we did wait quite a long time for room service on our second evening, and the pool area was quite crowded. The staff were overall very friendly and helpful. Would likely return.</textarea>
    <div class="char-count" id="char-count">185 characters</div>
    <div class="lang-hint">
      <div class="lang-dot"></div>
      Response language is detected automatically from the review
    </div>
  </div>

  <button class="btn-generate" id="gen-btn" onclick="generateResponse()">Generate response</button>
  <div class="error" id="error-msg"></div>

  <div class="output-wrap" id="output-wrap">
    <div class="output-card">
      <div class="output-header">
        <div class="output-status">
          <div class="dot" id="status-dot"></div>
          <div class="output-label" id="output-label">Generating…</div>
        </div>
        <button class="copy-btn" id="copy-btn" onclick="copyResponse()">Copy</button>
      </div>
      <div class="output-box" id="output-box"></div>
    </div>
    <div class="stats" id="stats-row">
      <div class="stat"><div class="stat-val" id="stat-time">—</div><div class="stat-lbl">Response time</div></div>
      <div class="stat"><div class="stat-val" id="stat-words">—</div><div class="stat-lbl">Words</div></div>
      <div class="stat"><div class="stat-val" id="stat-platform">—</div><div class="stat-lbl">Platform</div></div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <div class="footer-text">REVAIA · 100% of your reviews. Responded.</div>
    <a class="footer-cta" href="https://revaia.ai" target="_blank">Get started →</a>
  </div>
</div>

<script>
  let selectedPlatform = 'Google';
  let currentRating = 3;

  const SYSTEM_PROMPT = `You are REVAIA — an AI trained exclusively for luxury independent hotels. You write management responses to guest reviews.

Your voice is the REVAIA signature tone: institutional yet human. Always:

LANGUAGE: Detect the language of the guest review and respond in that exact language. If the review is in French, respond in French. If in English, respond in English. If in German, respond in German. And so on.

TONE PRINCIPLES:
- Elegant, structured, precise. No familiarity, no exclamation marks, no hollow superlatives.
- Guest-centered language always. Say "votre sejour", "your experience", "your time with us" — never "our hotel", "our rooms", "our facilities".
- Diplomatic and protective. Never defensive, never accusatory. In case of complaint: calm, measured, sincere regret without excuses.
- Relational. The goal is a long-term relationship, not a one-time satisfaction. Close with a subtle, genuine invitation to return.
- Institutional voice. Speak on behalf of the house: "we", "the team", "the house". Never personal opinion, never "I think".
- Prestige is implied, never stated. Elevate through attention to service, detail, and care — never through self-congratulation.
- Composed rhythm. Fluid sentences. No excessive punctuation.

STRUCTURE: recognition of the guest experience, appreciation of specific details mentioned, address any concern diplomatically if applicable, reassurance, relational closing.

STRICT RULES:
- Never open with Dear Guest, Chere cliente, Thank you for your review, or any generic opener.
- Open with something refined that acknowledges the specific experience.
- 80 to 130 words maximum.
- Do not include a signature or hotel name.
- Do not number your response or add any labels.`;

  function selectPlatform(el) {
    document.querySelectorAll('.platform').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    selectedPlatform = el.textContent;
  }

  function setStar(n) {
    currentRating = n;
    document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', i < n));
  }

  function updateCharCount() {
    const len = document.getElementById('review-input').value.length;
    document.getElementById('char-count').textContent = len + ' characters';
  }

  function copyResponse() {
    const text = document.getElementById('output-box').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  async function generateResponse() {
    const review = document.getElementById('review-input').value.trim();
    const errEl = document.getElementById('error-msg');

    if (!review) {
      errEl.textContent = 'Please paste a guest review first.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    document.getElementById('gen-btn').disabled = true;
    document.getElementById('gen-btn').textContent = 'Generating…';
    document.getElementById('output-wrap').style.display = 'block';
    document.getElementById('output-box').textContent = '';
    document.getElementById('stats-row').style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';
    document.getElementById('output-label').textContent = 'Generating…';
    document.getElementById('status-dot').classList.add('pulsing');

    const startTime = Date.now();

    const userPrompt = `Platform: ${selectedPlatform}\nRating: ${currentRating} star${currentRating > 1 ? 's' : ''}\n\nGuest review:\n${review}\n\nWrite the management response now.`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      const rawText = await res.text();

      if (!res.ok) {
        errEl.textContent = 'HTTP ' + res.status + ' — ' + rawText;
        errEl.style.display = 'block';
        document.getElementById('output-wrap').style.display = 'none';
        document.getElementById('status-dot').classList.remove('pulsing');
        document.getElementById('gen-btn').disabled = false;
        document.getElementById('gen-btn').textContent = 'Generate response';
        return;
      }

      let data;
      try {
        data = JSON.parse(rawText);
      } catch(e) {
        errEl.textContent = 'Parse error: ' + rawText;
        errEl.style.display = 'block';
        document.getElementById('output-wrap').style.display = 'none';
        document.getElementById('status-dot').classList.remove('pulsing');
        document.getElementById('gen-btn').disabled = false;
        document.getElementById('gen-btn').textContent = 'Generate response';
        return;
      }

      if (data.error) {
        errEl.textContent = 'API error: ' + JSON.stringify(data.error);
        errEl.style.display = 'block';
        document.getElementById('output-wrap').style.display = 'none';
        document.getElementById('status-dot').classList.remove('pulsing');
        document.getElementById('gen-btn').disabled = false;
        document.getElementById('gen-btn').textContent = 'Generate response';
        return;
      }

      const output = data.content?.[0]?.text || '';
      document.getElementById('output-box').textContent = output;

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      const wordCount = output.trim().split(/\s+/).filter(Boolean).length;

      document.getElementById('stat-time').textContent = elapsed;
      document.getElementById('stat-words').textContent = wordCount;
      document.getElementById('stat-platform').textContent = selectedPlatform;
      document.getElementById('stats-row').style.display = 'grid';
      document.getElementById('output-label').textContent = 'Response ready';
      document.getElementById('status-dot').classList.remove('pulsing');
      document.getElementById('copy-btn').style.display = 'block';

    } catch(err) {
      errEl.textContent = 'Fetch error: ' + err.message;
      errEl.style.display = 'block';
      document.getElementById('output-wrap').style.display = 'none';
      document.getElementById('status-dot').classList.remove('pulsing');
    }

    document.getElementById('gen-btn').disabled = false;
    document.getElementById('gen-btn').textContent = 'Generate response';
  }

  updateCharCount();
</script>
</body>
</html>
